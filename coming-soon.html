<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Studio Candle</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        let currentTheme = savedTheme;

        if (!savedTheme) {
            currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
    <style>
        body.coming-soon-page {
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 50% 18%, rgba(212, 168, 83, 0.28), transparent 20%),
                linear-gradient(135deg, rgba(253, 250, 246, 0.96), rgba(245, 230, 211, 0.94)),
                url("assets/images/hero-1.png") center/cover no-repeat fixed;
            color: var(--text-color);
        }

        body.coming-soon-page::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(44, 26, 14, 0.32), rgba(44, 26, 14, 0.1) 40%, rgba(44, 26, 14, 0.24));
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body.coming-soon-page {
            background:
                radial-gradient(circle at 50% 18%, rgba(212, 168, 83, 0.18), transparent 18%),
                linear-gradient(135deg, rgba(26, 16, 8, 0.94), rgba(34, 21, 11, 0.92)),
                url("assets/images/hero-1.png") center/cover no-repeat fixed;
        }

        [data-theme="dark"] body.coming-soon-page::before {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5), rgba(26, 16, 8, 0.18) 40%, rgba(0, 0, 0, 0.45));
        }

        .coming-soon-main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 48px 0 72px;
        }

        .coming-soon-panel {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(32px, 5vw, 72px);
            text-align: center;
            border-radius: 32px;
            background: rgba(253, 250, 246, 0.78);
            border: 1px solid rgba(44, 26, 14, 0.12);
            box-shadow: 0 30px 80px rgba(44, 26, 14, 0.16);
            backdrop-filter: blur(18px);
        }

        [data-theme="dark"] .coming-soon-panel {
            background: rgba(26, 16, 8, 0.72);
            border-color: rgba(212, 168, 83, 0.16);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
        }

        .coming-soon-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            color: var(--primary-color);
            text-decoration: none;
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 1;
        }

        .coming-soon-brand .flame-icon {
            width: 52px;
            height: 52px;
        }

        .coming-soon-title {
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        .coming-soon-copy {
            max-width: 760px;
            margin: 0 auto 40px;
            font-size: 1.2rem;
            color: rgba(44, 26, 14, 0.78);
        }

        [data-theme="dark"] .coming-soon-copy {
            color: rgba(245, 230, 211, 0.8);
        }

        .countdown-wrap {
            gap: 20px;
            margin-bottom: 48px;
        }

        .countdown-box {
            min-width: 140px;
            padding: 24px 20px;
            text-align: center;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(44, 26, 14, 0.1);
            box-shadow: 0 16px 32px rgba(44, 26, 14, 0.08);
            backdrop-filter: blur(8px);
        }

        [data-theme="dark"] .countdown-box {
            background: rgba(245, 230, 211, 0.08);
            border-color: rgba(245, 230, 211, 0.12);
            box-shadow: none;
        }

        .countdown-title {
            margin-top: 8px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(44, 26, 14, 0.58);
        }

        [data-theme="dark"] .countdown-title {
            color: rgba(245, 230, 211, 0.58);
        }

        .countdown-val {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-gold);
            line-height: 1;
        }

        .coming-soon-note {
            margin-bottom: 18px;
            font-weight: 700;
            color: var(--primary-color);
        }

        [data-theme="dark"] .coming-soon-note {
            color: var(--text-color);
        }

        .coming-soon-form {
            max-width: 620px;
            margin: 0 auto;
        }

        .coming-soon-form .form-control {
            min-height: 72px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(44, 26, 14, 0.14);
            color: var(--text-color);
        }

        .coming-soon-form .form-control::placeholder {
            color: rgba(44, 26, 14, 0.55);
        }

        .coming-soon-form .btn-studio-primary {
            min-height: 72px;
            padding-inline: 32px;
            white-space: nowrap;
        }

        [data-theme="dark"] .coming-soon-form .form-control {
            background: rgba(245, 230, 211, 0.08);
            border-color: rgba(245, 230, 211, 0.18);
            color: var(--text-color);
        }

        [data-theme="dark"] .coming-soon-form .form-control::placeholder {
            color: rgba(245, 230, 211, 0.55);
        }

        @media (max-width: 767.98px) {
            .coming-soon-main {
                padding: 32px 0 56px;
            }

            .coming-soon-panel {
                border-radius: 24px;
            }

            .countdown-box {
                min-width: calc(50% - 10px);
            }

            .coming-soon-form .btn-studio-primary,
            .coming-soon-form .form-control {
                width: 100%;
                border-radius: 18px !important;
            }
        }
    </style>
</head>
<body class="coming-soon-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="coming-soon-main">
        <div class="container-custom">
            <section class="coming-soon-panel reveal-on-scroll active">
                <a href="index.html" class="coming-soon-brand">
                    <svg viewBox="0 0 40 40" fill="none" class="flame-icon">
                        <path d="M12 30V18C12 16.8954 12.8954 16 14 16H18C19.1046 16 20 16.8954 20 18V30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M12 30H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="16" y1="16" x2="16" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M16 4C16 4 19 7.5 19 10C19 11.6569 17.6569 13 16 13C14.3431 13 13 11.6569 13 10C13 7.5 16 4 16 4Z" fill="var(--accent-gold)"></path>
                    </svg>
                    <span>LUMORA</span>
                </a>
                <h1 class="display-2 fw-800 coming-soon-title">Our New Glow is Coming Soon</h1>
                <p class="coming-soon-copy">We're meticulously crafting a new digital experience for candle enthusiasts.</p>

                <div class="d-flex justify-content-center flex-wrap countdown-wrap">
                    <div class="countdown-box">
                        <div class="countdown-val" id="days">00</div>
                        <div class="countdown-title">Days</div>
                    </div>
                    <div class="countdown-box">
                        <div class="countdown-val" id="hours">00</div>
                        <div class="countdown-title">Hours</div>
                    </div>
                    <div class="countdown-box">
                        <div class="countdown-val" id="minutes">00</div>
                        <div class="countdown-title">Minutes</div>
                    </div>
                    <div class="countdown-box">
                        <div class="countdown-val" id="seconds">00</div>
                        <div class="countdown-title">Seconds</div>
                    </div>
                </div>

                <div class="coming-soon-form">
                    <p class="coming-soon-note">Be the first to know when we launch.</p>
                    <form class="d-flex flex-column flex-sm-row gap-3">
                        <input type="email" class="form-control p-3" placeholder="Enter your email">
                        <button type="submit" class="btn-studio-primary">Notify Me</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 15);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, "0");
            document.getElementById("hours").innerText = h.toString().padStart(2, "0");
            document.getElementById("minutes").innerText = m.toString().padStart(2, "0");
            document.getElementById("seconds").innerText = s.toString().padStart(2, "0");

            if (distance < 0) {
                clearInterval(intvl);
                const panel = document.querySelector(".coming-soon-panel");
                if (panel) {
                    panel.innerHTML = "<h1 class='display-4 fw-800 mb-3'>We're Open!</h1><a href='index.html' class='btn-studio-primary btn-lg mt-3'>Enter the Studio</a>";
                }
            }
        }

        const intvl = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
