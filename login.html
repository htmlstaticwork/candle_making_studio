<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Studio Candle</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body { background: var(--secondary-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; flex-direction: column; }
        .auth-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 50px; width: 100%; max-width: 480px; box-shadow: 0 15px 40px var(--card-shadow); position: relative; margin: auto; }
        .auth-toggles { position: fixed; top: 20px; inset-inline-end: 20px; z-index: 1000; }
        .social-btn { border: 1px solid rgba(44, 26, 14, 0.1); border-radius: var(--radius-sm); padding: 10px; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition-smooth); font-weight: 500; font-size: 0.9rem; }
        .social-btn:hover { background: rgba(44, 26, 14, 0.05); }
        .auth-card a.text-gold:hover { color: #b68d40 !important; text-decoration: underline; text-underline-offset: 3px; }
        .auth-divider-label { background: var(--card-bg); color: rgba(44, 26, 14, 0.5); line-height: 1; }

        @media (max-width: 576px) {
            .auth-card { padding: 30px 20px; margin-top: 40px; }
            .social-btn { font-size: 0.8rem; padding: 8px; }
            .auth-toggles { top: 15px; inset-inline-end: 15px; }
            .auth-card .text-center.mb-5 { padding-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="auth-toggles d-flex gap-2">
        <button id="theme-toggle" class="theme-toggle"><i class="bi bi-moon"></i></button>
        <button id="rtl-toggle" class="rtl-toggle"><i class="bi bi-arrow-left-right"></i></button>
    </div>
    
    <div class="auth-card reveal-on-scroll">

        <div class="text-center mb-5">
            <a href="index.html" class="navbar-brand justify-content-center">
                <svg viewBox="0 0 40 40" fill="none" class="flame-icon">
                    <path d="M12 30V18C12 16.8954 12.8954 16 14 16H18C19.1046 16 20 16.8954 20 18V30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M12 30H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="16" y1="16" x2="16" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M16 4C16 4 19 7.5 19 10C19 11.6569 17.6569 13 16 13C14.3431 13 13 11.6569 13 10C13 7.5 16 4 16 4Z" fill="var(--accent-gold)">
                        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
                    </path>
                </svg>
                LUMORA
            </a>
            <p class="opacity-50 small mt-2">Welcome back to the studio 🕯️</p>
        </div>

        <form action="dashboard.html">
            <div class="mb-4">
                <label class="form-label fw-bold small">Email Address</label>
                <input type="email" class="form-control" placeholder="hello@artisan.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small mb-2">Password</label>
                <div class="input-group mb-2">
                    <input type="password" class="form-control" required id="passwordInput">
                    <button class="btn btn-outline-secondary border-start-0" type="button" onclick="const p = document.getElementById('passwordInput'); p.type = p.type === 'password' ? 'text' : 'password';"><i class="bi bi-eye"></i></button>
                </div>
                <div class="text-end-logical">
                    <a href="#" class="small text-gold fw-bold">Forgot Password?</a>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn-studio-primary w-100 py-3 mb-4">Sign In</button>
        </form>

        <div class="text-center mb-4 position-relative">
            <hr class="opacity-10">
            <span class="position-absolute top-50 start-50 translate-middle px-3 small auth-divider-label">or continue with</span>
        </div>

        <div class="d-flex gap-3 mb-5">
            <button class="social-btn"><i class="bi bi-google text-danger"></i> Google</button>
            <button class="social-btn"><i class="bi bi-apple"></i> Apple</button>
            <button class="social-btn"><i class="bi bi-facebook text-primary"></i> Facebook</button>
        </div>

        <p class="text-center small mb-0">Don't have an account? <a href="signup.html" class="text-gold fw-bold">Sign up now</a></p>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Special logic for auth card reveal
        document.querySelector('.auth-card').classList.add('active');
    </script>
</body>
</html>
