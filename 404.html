<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Melted | Studio Candle</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <script>
        const savedTheme = localStorage.getItem("theme");
        let currentTheme = savedTheme;

        if (!savedTheme) {
            currentTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        document.documentElement.setAttribute("data-theme", currentTheme);
    </script>
    <style>
        body.error-page {
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 50% 18%, rgba(212, 168, 83, 0.28), transparent 20%),
                linear-gradient(135deg, rgba(253, 250, 246, 0.96), rgba(245, 230, 211, 0.94)),
                url("assets/images/hero-1.png") center/cover no-repeat fixed;
            color: var(--text-color);
        }

        body.error-page::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(44, 26, 14, 0.32), rgba(44, 26, 14, 0.1) 40%, rgba(44, 26, 14, 0.24));
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body.error-page {
            background:
                radial-gradient(circle at 50% 18%, rgba(212, 168, 83, 0.18), transparent 18%),
                linear-gradient(135deg, rgba(26, 16, 8, 0.94), rgba(34, 21, 11, 0.92)),
                url("assets/images/hero-1.png") center/cover no-repeat fixed;
        }

        [data-theme="dark"] body.error-page::before {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5), rgba(26, 16, 8, 0.18) 40%, rgba(0, 0, 0, 0.45));
        }

        .error-main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 48px 0 72px;
        }

        .error-panel {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: clamp(32px, 5vw, 72px);
            text-align: center;
            border-radius: 32px;
            background: rgba(253, 250, 246, 0.78);
            border: 1px solid rgba(44, 26, 14, 0.12);
            box-shadow: 0 30px 80px rgba(44, 26, 14, 0.16);
            backdrop-filter: blur(18px);
        }

        [data-theme="dark"] .error-panel {
            background: rgba(26, 16, 8, 0.72);
            border-color: rgba(212, 168, 83, 0.16);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
        }

        .error-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            color: var(--primary-color);
            text-decoration: none;
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 1;
        }

        .error-brand .flame-icon {
            width: 52px;
            height: 52px;
        }

        .error-code {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 170px;
            padding: 14px 28px;
            width: fit-content;
            margin: 0 auto 26px;
            border-radius: 999px;
            background: rgba(212, 168, 83, 0.14);
            border: 1px solid rgba(212, 168, 83, 0.22);
            color: var(--accent-gold);
            font-size: clamp(2.8rem, 7vw, 5rem);
            font-weight: 800;
            line-height: 1;
            box-shadow: 0 18px 40px rgba(44, 26, 14, 0.08);
        }

        [data-theme="dark"] .error-code {
            background: rgba(212, 168, 83, 0.1);
            border-color: rgba(212, 168, 83, 0.16);
            box-shadow: none;
        }

        .error-title {
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        .error-copy {
            max-width: 760px;
            margin: 0 auto 38px;
            font-size: 1.2rem;
            color: rgba(44, 26, 14, 0.78);
        }

        [data-theme="dark"] .error-copy {
            color: rgba(245, 230, 211, 0.8);
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .error-actions .btn-studio-primary,
        .error-actions .btn-studio-secondary {
            min-height: 64px;
            padding-inline: 30px;
        }

        @media (max-width: 767.98px) {
            .error-main {
                padding: 32px 0 56px;
            }

            .error-panel {
                border-radius: 24px;
            }

            .error-actions {
                flex-direction: column;
            }

            .error-actions .btn-studio-primary,
            .error-actions .btn-studio-secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body class="error-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="error-main">
        <div class="container-custom">
            <section class="error-panel reveal-on-scroll active">
                <a href="index.html" class="error-brand">
                    <svg viewBox="0 0 40 40" fill="none" class="flame-icon">
                        <path d="M12 30V18C12 16.8954 12.8954 16 14 16H18C19.1046 16 20 16.8954 20 18V30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M12 30H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="16" y1="16" x2="16" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M16 4C16 4 19 7.5 19 10C19 11.6569 17.6569 13 16 13C14.3431 13 13 11.6569 13 10C13 7.5 16 4 16 4Z" fill="var(--accent-gold)"></path>
                    </svg>
                    <span>LUMORA</span>
                </a>
                <div class="error-code">404</div>
                <h1 class="display-2 fw-800 error-title">Looks like this page melted away.</h1>
                <p class="error-copy">Don't worry, we can help you find your way back to the light and reconnect with the rest of the studio.</p>
                <div class="error-actions">
                    <a href="index.html" class="btn-studio-primary">Back to Home</a>
                    <a href="workshops.html" class="btn-studio-secondary">Explore Workshops</a>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
